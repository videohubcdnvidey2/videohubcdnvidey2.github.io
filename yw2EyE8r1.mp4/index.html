
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play List Video</title>
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .video-container {
      position: relative;
      width: 90%;
      max-width: 600px;
    }

    video {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .close-ad {
      background: red;
      border: none;
      color: #fff;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="myVideo" controls>
      <source src="https://cdn.videy.co/6yIxZAzU1.mp4" type="video/mp4">
      Browser Anda tidak mendukung pemutar video.
    </video>

  <header>
<script src="https://nailsheedlesswarn.com/21/7a/cd/217acd50d4e42475eb7be554d1d981f8.js"></script>
  </header>

  <script>
    // Cegah masuk fullscreen lewat JavaScript
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    });

    // Proteksi klik kanan dan F12
    (function () {
      document.addEventListener('contextmenu', function (e) {
        if (!e.target.closest('.allow-context, iframe')) {
          e.preventDefault();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === "F12") e.preventDefault();
        if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) e.preventDefault();
        if (e.ctrlKey && ["U","S"].includes(e.key.toUpperCase())) e.preventDefault();
      });
    })();
  </script>
